name: EAS Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm install
      - name: Generate Keystore
        run: |
          keytool -genkeypair -v -keystore release.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=Nitish KC, OU=dev, O=nitishkc, L=Lucknow, ST=UP, C=IN"
      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
